<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>log-005 impact event</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">
    <h1>log-005 衝撃イベント記録</h1>

    <section class="panel">
      <div class="label">現在の衝撃レベル</div>
      <div id="level" class="level level-none">待機中</div>
      <div id="delta" class="metric">変化量: -</div>
      <div id="time" class="metric">最終受信: -</div>
    </section>

    <section class="panel">
      <div class="label">イベント履歴</div>
      <ul id="logs" class="logs"></ul>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
