<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>log-009 impact log sync</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">
    <h1>log-009 impact log sync</h1>

    <section class="panel">
      <div class="label">SYNCED LOGS</div>
      <button id="syncButton" class="sync-button">Sync Logs</button>
      <div id="status" class="metric">STATUS: idle</div>
      <div id="count" class="metric">COUNT: 0</div>
      <div id="level" class="metric">LATEST LEVEL: -</div>
      <div id="delta" class="metric">LATEST DELTA: -</div>
    </section>

    <section class="panel">
      <div class="label">LOG LIST</div>
      <ul id="logs" class="logs"></ul>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
